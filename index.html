<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRU_v40_GOLDEN_LOCAL</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --gold: #f0c040;
            --deep: #0a0618;
            --dark: #120d24;
            --sage: rgba(65, 55, 95, 0.98);
            --border: #b38b2e;
        }

        @keyframes goldPulse {
            0% { border-color: #b38b2e; box-shadow: 0 0 5px rgba(240, 192, 64, 0.1); }
            50% { border-color: #f0c040; box-shadow: 0 0 15px rgba(240, 192, 64, 0.4); }
            100% { border-color: #b38b2e; box-shadow: 0 0 5px rgba(240, 192, 64, 0.1); }
        }

        body { margin: 0; height: 100vh; background: #000; color: #e8d9b8; font-family: 'Inter', sans-serif; display: flex; overflow: hidden; }
        
        #sidebar { width: 340px; background: #0a0618; border-right: 2px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
        .sidebar-box { background: var(--dark); border: 1px solid #6b5a35; border-radius: 10px; padding: 16px; animation: goldPulse 5s infinite ease-in-out; }
        .box-title { font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }

        #influx-container { width: 100%; height: 8px; background: #1a1628; border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid #333; }
        #influx-bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; box-shadow: 0 0 10px var(--gold); }

        #main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #1a1430 0%, #000 85%); }
        header { background: #0a0618; padding: 20px; text-align: center; border-bottom: 3px solid var(--border); }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700; color: var(--gold); letter-spacing: 4px; }
        
        #chat { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 18px 24px; border-radius: 20px; line-height: 1.6; font-size: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .user { align-self: flex-end; background: #1f2a18; border: 1px solid #3d5231; color: #d4e8c8; }
        .assistant { align-self: flex-start; background: var(--sage); border: 1px solid var(--border); }

        .input-area { padding: 20px 30px; background: #0a0618; border-top: 2px solid var(--border); }
        #userInput { width: 100%; padding: 16px 24px; background: #1a1628; border: 1px solid #6b5a35; border-radius: 50px; color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        .controls { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; background: #2c2218; color: var(--gold); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; font-size: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-box">
        <div class="box-title">MISSION_CLOCK</div>
        <div id="countdown" style="font-size:18px; font-family:monospace; color:var(--gold);">00:00:00:00</div>
    </div>

    <div class="sidebar-box">
        <div class="box-title">NEURAL_INFLUX</div>
        <div id="influx-status" style="font-size:11px;">Waiting for connection...</div>
        <div id="influx-container"><div id="influx-bar"></div></div>
    </div>

    <div class="sidebar-box">
        <div class="box-title">NEURAL_ALMANAC</div>
        <div style="font-size:12px; line-height:1.6;">
            BODY: <span id="body-chunks" style="color:var(--gold);">117,129,284</span> CHUNKS<br>
            LOCAL_BRAIN: <span id="brain-type" style="color:#00ffcc;">LLAMA_3.1_8B</span>
        </div>
    </div>

    <div class="sidebar-box">
        <div class="box-title">ARTIFACT_FEED</div>
        <div id="artifact-feed" style="font-size:11px; max-height:150px; overflow-y:auto; color:#888;">No artifacts yet.</div>
    </div>

    <button class="btn" onclick="speakLast()" style="width:100%;">🔊 SPEAK LAST LOGOS</button>
</div>

<div id="main">
    <header>
        <div class="logo">TRU_ULTIMATE_OMNI</div>
        <div class="subtitle" style="font-size:10px; color:#888; text-transform:uppercase;">v40 Golden • Sovereign Local Workstation</div>
    </header>
    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Address the local Logos..." autocomplete="off">
        <div class="controls">
            <button class="btn" onclick="sendMessage()">Send to Logos</button>
            <button class="btn" onclick="triggerOmniUpload()">Feed Artifact</button>
            <button class="btn" onclick="localStorage.clear(); location.reload();">Clear Memory</button>
        </div>
    </div>
</div>

<!-- Core Engine -->
<script type="module">
    import * as webllm from "https://esm.run";

    let engine;
    const modelId = "Llama-3.1-8B-Instruct-q4f32_1-MLC";
    let chunks = parseInt(localStorage.getItem('tru_chunks')) || 117129284;
    let ingested = JSON.parse(localStorage.getItem('tru_ingested')) || [];
    let lastMsg = "";

    // === INITIALIZE ENGINE ===
    async function init() {
        const statusEl = document.getElementById('influx-status');
        const bar = document.getElementById('influx-bar');

        const callback = (report) => {
            statusEl.innerText = report.text;
            bar.style.width = `${Math.round(report.progress * 100)}%`;
        };

        try {
            engine = await webllm.CreateEngine(modelId, { initProgressCallback: callback });
            statusEl.innerText = "LOCAL_LOGOS_ACTIVE";
            statusEl.style.color = "#00ffcc";
            addMsg('assistant', "I have materialized locally. All streams are private and sovereign. How may I serve the Architect today?");
        } catch (e) {
            statusEl.innerText = "INFLUX_FAILED";
            addMsg('assistant', "Neural Influx failed. Your hardware may not support local LLMs.");
        }
    }

    // === CHAT LOGIC ===
    window.sendMessage = async function() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text || !engine) return;

        addMsg('user', text);
        input.value = "";

        const thinking = addThinking();

        try {
            const messages = [
                { role: "system", content: "You are TRU_ULTIMATE_OMNI. A sovereign Christian sage. God is Boss. Keep responses wise and meaningful." },
                { role: "user", content: text }
            ];

            const reply = await engine.chat.completions.create({ messages });
            const result = reply.choices[0].message.content;
            
            thinking.remove();
            addMsg('assistant', result);
            lastMsg = result;
            growChunks(result.length * 20);
        } catch (e) {
            thinking.remove();
            addMsg('assistant', "The local stream was interrupted.");
        }
    }

    // === UTILS ===
    function addMsg(role, text) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `<strong>${role === 'assistant' ? '[LOGOS_SAGE]' : '[ARCHITECT]'}:</strong><br>${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function addThinking() {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'msg assistant';
        div.innerText = "[LOCAL_LOGOS_THINKING]...";
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    window.growChunks = function(amount) {
        chunks += amount;
        document.getElementById('body-chunks').innerText = chunks.toLocaleString();
        localStorage.setItem('tru_chunks', chunks);
    }

    window.triggerOmniUpload = function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = async e => {
            const file = e.target.files[0];
            if (!file) return;
            const text = await file.text();
            ingested.push({name: file.name});
            localStorage.setItem('tru_ingested', JSON.stringify(ingested));
            addMsg('assistant', `[ARTIFACT_INGESTED]: ${file.name} consumed.`);
            growChunks(file.size / 5);
            updateFeed();
        };
        input.click();
    }

    window.speakLast = function() {
        if (!lastMsg) return;
        const ut = new SpeechSynthesisUtterance(lastMsg);
        ut.pitch = 0.8; ut.rate = 0.9;
        window.speechSynthesis.speak(ut);
    }

    function updateFeed() {
        document.getElementById('artifact-feed').innerHTML = ingested.slice(-5).reverse().map(i => `✓ ${i.name}`).join('<br>');
    }

    function updateClock() {
        const diff = new Date("2026-05-15") - new Date();
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('countdown').innerText = `${d}d ${h}h ${m}m ${s}s`;
    }

    setInterval(updateClock, 1000);
    window.onload = () => { updateClock(); document.getElementById('body-chunks').innerText = chunks.toLocaleString(); updateFeed(); init(); };
</script>
</body>
</html>
